<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Template Editor · LLM Gateway</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f12; --bg2: #13161b; --bg3: #1a1e25; --bg4: #20242c;
      --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.14);
      --text: #e8eaf0; --text2: #8b90a0; --text3: #555a6a;
      --accent: #4f8ef7; --accent-dim: rgba(79,142,247,0.12);
      --green: #3ecf8e; --green-dim: rgba(62,207,142,0.12);
      --red: #f56565; --red-dim: rgba(245,101,101,0.12);
      --radius: 10px; --radius-lg: 14px;
    }

    html, body { height: 100%; }
    body {
      font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text);
      display: flex; flex-direction: column; overflow: hidden;
    }
    a { color: inherit; text-decoration: none; }

    /* ── Topbar ── */
    .topbar {
      display: flex; align-items: center; gap: 14px;
      padding: 12px 20px; border-bottom: 1px solid var(--border);
      background: rgba(13,15,18,0.9); backdrop-filter: blur(10px);
      flex-shrink: 0;
    }
    .back-link {
      font-size: 13px; color: var(--text2); display: flex; align-items: center; gap: 6px;
      padding: 6px 10px; border-radius: 8px; transition: all .15s;
    }
    .back-link:hover { color: var(--text); background: var(--bg3); }
    .topbar-title { font-size: 14px; font-weight: 700; letter-spacing: -0.01em; }
    .topbar-sub { font-size: 11px; color: var(--text3); }
    .topbar-actions { margin-left: auto; display: flex; gap: 8px; }
    .tb-btn {
      display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600;
      padding: 7px 13px; border-radius: 8px; cursor: pointer; border: 1px solid var(--border);
      background: var(--bg2); color: var(--text2); transition: all .15s;
    }
    .tb-btn:hover { color: var(--text); border-color: var(--border2); }
    .tb-btn.primary { background: var(--accent-dim); color: var(--accent); border-color: rgba(79,142,247,0.25); }

    /* ── Layout ── */
    .layout { flex: 1; display: flex; min-height: 0; }

    /* ── Companion (left) ── */
    .companion {
      width: 380px; flex-shrink: 0; display: flex; flex-direction: column;
      border-right: 1px solid var(--border); background: var(--bg2);
    }
    .companion-head {
      padding: 14px 16px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
    }
    .companion-head .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 0 3px var(--green-dim); }
    .companion-head-text { font-size: 13px; font-weight: 700; }
    .companion-head-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }

    .chat-log { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .msg { max-width: 92%; font-size: 13px; line-height: 1.6; border-radius: 12px; padding: 10px 13px; animation: fadeIn .25s ease both; }
    .msg.user { align-self: flex-end; background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
    .msg.ai { align-self: flex-start; background: var(--bg3); color: var(--text); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .msg.ai.error { background: var(--red-dim); border-color: rgba(245,101,101,0.25); color: #ffb3b3; }
    .msg.thinking { display: flex; align-items: center; gap: 6px; color: var(--text3); font-size: 12px; }
    .dotpulse { display: flex; gap: 3px; }
    .dotpulse span { width: 5px; height: 5px; border-radius: 50%; background: var(--text3); animation: pulse 1.2s infinite ease-in-out; }
    .dotpulse span:nth-child(2) { animation-delay: .2s; } .dotpulse span:nth-child(3) { animation-delay: .4s; }
    @keyframes pulse { 0%, 80%, 100% { opacity: .25; transform: scale(.8); } 40% { opacity: 1; transform: scale(1); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    .composer { border-top: 1px solid var(--border); padding: 12px; }
    .composer-box {
      display: flex; align-items: flex-end; gap: 8px; background: var(--bg3);
      border: 1px solid var(--border); border-radius: 12px; padding: 8px 8px 8px 12px;
      transition: border-color .15s;
    }
    .composer-box:focus-within { border-color: var(--border2); }
    .composer textarea {
      flex: 1; background: none; border: none; outline: none; resize: none;
      color: var(--text); font-family: inherit; font-size: 13px; line-height: 1.5;
      max-height: 120px; min-height: 22px; padding: 4px 0;
    }
    .composer textarea::placeholder { color: var(--text3); }
    .send-btn {
      width: 30px; height: 30px; border-radius: 8px; border: none; cursor: pointer;
      background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: opacity .15s, transform .1s;
    }
    .send-btn:hover { opacity: .88; }
    .send-btn:active { transform: scale(.94); }
    .send-btn:disabled { opacity: .35; cursor: not-allowed; }
    .composer-hint { font-size: 10.5px; color: var(--text3); margin-top: 7px; padding-left: 2px; }

    .quick-chips { display: flex; flex-wrap: wrap; gap: 6px; padding: 0 16px 12px; }
    .chip {
      font-size: 11.5px; padding: 5px 10px; border-radius: 20px; background: var(--bg3);
      border: 1px solid var(--border); color: var(--text2); cursor: pointer; transition: all .15s;
    }
    .chip:hover { color: var(--text); border-color: var(--border2); }

    /* ── Stage (right) ── */
    .stage { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg); }
    .tabbar { display: flex; align-items: center; gap: 4px; padding: 8px 12px; border-bottom: 1px solid var(--border); background: var(--bg2); flex-shrink: 0; }
    .tabbtn {
      font-size: 12px; font-weight: 600; padding: 7px 13px; border-radius: 7px; cursor: pointer;
      border: none; background: none; color: var(--text2); transition: all .15s; display: flex; align-items: center; gap: 6px;
    }
    .tabbtn:hover { color: var(--text); background: var(--bg3); }
    .tabbtn.active { color: var(--accent); background: var(--accent-dim); }
    .tabbar .spacer { flex: 1; }
    .save-indicator { font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 5px; padding: 0 8px; }
    .save-indicator .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }

    .stage-body { flex: 1; min-height: 0; position: relative; }
    .stage-pane { position: absolute; inset: 0; display: none; }
    .stage-pane.active { display: block; }

    #previewFrame { width: 100%; height: 100%; border: none; background: #fff; }

    .code-pane { display: flex; height: 100%; overflow: hidden; }
    .gutter { padding: 18px 10px 18px 18px; border-right: 1px solid var(--border); color: var(--text3);
      text-align: right; font-family: 'JetBrains Mono', monospace; font-size: 12.5px; line-height: 1.6; user-select: none; overflow: hidden; }
    .code-scroll { flex: 1; overflow: auto; }
    .code-pane pre { margin: 0; padding: 18px; font-family: 'JetBrains Mono', monospace; font-size: 12.5px; line-height: 1.6; }
    .code-pane code { font-family: inherit !important; background: none !important; }

    .fatal { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 10px; color: var(--text2); }
    .fatal .icon { font-size: 34px; opacity: .5; }

    ::-webkit-scrollbar { width: 9px; height: 9px; }
    ::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }

    @media (max-width: 860px) {
      .layout { flex-direction: column; }
      .companion { width: 100%; height: 42%; border-right: none; border-bottom: 1px solid var(--border); }
      .stage { height: 58%; }
    }
  </style>
</head>

<body>

  <div class="topbar">
    <a class="back-link" href="templates.html">← Templates</a>
    <div>
      <div class="topbar-title" id="templateTitle">Loading…</div>
      <div class="topbar-sub">Generated instantly from backend template code · edit it live on the left</div>
    </div>
    <div class="topbar-actions">
      <button class="tb-btn" id="downloadBtn" onclick="downloadZip()">⬇ Download ZIP</button>
      <button class="tb-btn primary" onclick="window.open('templates.html','_self')">✨ Try another template</button>
    </div>
  </div>

  <div class="layout">
    <aside class="companion">
      <div class="companion-head">
        <span class="dot"></span>
        <div>
          <div class="companion-head-text">AI Edit Companion</div>
          <div class="companion-head-sub">Describe a change, I'll rewrite the code</div>
        </div>
      </div>
      <div class="chat-log" id="chatLog"></div>
      <div class="quick-chips" id="quickChips">
        <button class="chip" onclick="quickPrompt('Switch the accent color to a warm sunset orange')">🎨 Recolor</button>
        <button class="chip" onclick="quickPrompt('Rewrite the hero headline and subheading to sound punchier')">✍️ Rewrite hero copy</button>
        <button class="chip" onclick="quickPrompt('Add a dark mode toggle in the navbar')">🌙 Add dark mode</button>
        <button class="chip" onclick="quickPrompt('Make the layout feel more spacious with larger section padding')">📐 More whitespace</button>
      </div>
      <div class="composer">
        <div class="composer-box">
          <textarea id="chatInput" placeholder="e.g. Make the hero background a purple gradient…" rows="1"></textarea>
          <button class="send-btn" id="sendBtn" onclick="handleSend()" aria-label="Send">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
          </button>
        </div>
        <div class="composer-hint">Edits apply to the live preview instantly — nothing is saved until you download.</div>
      </div>
    </aside>

    <main class="stage">
      <div class="tabbar" id="tabbar" style="display:none;">
        <button class="tabbtn active" data-tab="preview" onclick="switchTab('preview')">🌐 Live Preview</button>
        <button class="tabbtn" data-tab="index_html" onclick="switchTab('index_html')">📄 index.html</button>
        <button class="tabbtn" data-tab="styles_css" onclick="switchTab('styles_css')">🎨 styles.css</button>
        <button class="tabbtn" data-tab="script_js" onclick="switchTab('script_js')">⚡ script.js</button>
        <div class="spacer"></div>
        <div class="save-indicator" id="saveIndicator"><span class="dot"></span> Up to date</div>
      </div>
      <div class="stage-body" id="stageBody">
        <div class="fatal">
          <div class="icon">⏳</div>
          <div>Generating your template…</div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const templateId = params.get('template');

    let currentFiles = { index_html: '', styles_css: '', script_js: '' };
    let historyLog = [];
    let planTitle = '';
    let activeTab = 'preview';
    let stageReady = false;

    const $ = id => document.getElementById(id);

    function getFile(arr, name) {
      const f = (arr || []).find(f => f.filename === name);
      return f ? f.content : '';
    }

    function buildStageShell() {
      $('stageBody').innerHTML = `
        <div class="stage-pane active" id="pane-preview"><iframe id="previewFrame"></iframe></div>
        <div class="stage-pane" id="pane-index_html"><div class="code-pane"><div class="gutter" id="gutter-index_html"></div><div class="code-scroll"><pre><code class="language-markup" id="code-index_html"></code></pre></div></div></div>
        <div class="stage-pane" id="pane-styles_css"><div class="code-pane"><div class="gutter" id="gutter-styles_css"></div><div class="code-scroll"><pre><code class="language-css" id="code-styles_css"></code></pre></div></div></div>
        <div class="stage-pane" id="pane-script_js"><div class="code-pane"><div class="gutter" id="gutter-script_js"></div><div class="code-scroll"><pre><code class="language-javascript" id="code-script_js"></code></pre></div></div></div>
      `;
      $('tabbar').style.display = 'flex';
      stageReady = true;
    }

    function switchTab(tab) {
      activeTab = tab;
      document.querySelectorAll('.tabbtn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
      document.querySelectorAll('.stage-pane').forEach(p => p.classList.remove('active'));
      $('pane-' + tab).classList.add('active');
      if (tab !== 'preview') renderCodeTab(tab);
    }

    function renderCodeTab(key) {
      const content = currentFiles[key] || '';
      const codeEl = $('code-' + key);
      codeEl.textContent = content;
      const lineCount = content.split('\n').length;
      $('gutter-' + key).innerHTML = Array.from({ length: lineCount }, (_, i) => `<div>${i + 1}</div>`).join('');
      if (window.Prism) Prism.highlightElement(codeEl);
    }

    function renderPreview() {
      let combined = currentFiles.index_html || '';
      const css = currentFiles.styles_css || '';
      const js = currentFiles.script_js || '';

      if (combined.includes('href="styles.css"')) {
        combined = combined.replace(/<link[^>]*href="styles\.css"[^>]*>/i, `<style>${css}</style>`);
      } else {
        combined = combined.replace('</head>', `<style>${css}</style></head>`);
      }

      if (combined.includes('src="script.js"')) {
        combined = combined.replace(/<script[^>]*src="script\.js"[^>]*><\/script>/i, '<script>' + js + '</s' + 'cript>');
      } else {
        combined = combined.replace('</body>', '<script>' + js + '</s' + 'cript></body>');
      }

      const iframe = $('previewFrame');
      const doc = iframe.contentWindow || iframe.contentDocument?.document || iframe.contentDocument;
      doc.document.open();
      doc.document.write(combined);
      doc.document.close();

      if (activeTab !== 'preview') renderCodeTab(activeTab);
    }

    function showFatal(msg) {
      $('stageBody').innerHTML = `<div class="fatal"><div class="icon">⚠️</div><div>${msg}</div></div>`;
    }

    // ── Chat ────────────────────────────────────────────────────────────────
    function addMessage(role, html) {
      const el = document.createElement('div');
      el.className = 'msg ' + role;
      el.innerHTML = html;
      $('chatLog').appendChild(el);
      $('chatLog').scrollTop = $('chatLog').scrollHeight;
      return el;
    }

    function addThinking() {
      return addMessage('ai thinking', `<div class="dotpulse"><span></span><span></span><span></span></div> Applying your edit…`);
    }

    function quickPrompt(text) {
      $('chatInput').value = text;
      handleSend();
    }

    async function handleSend() {
      const input = $('chatInput');
      const text = input.value.trim();
      if (!text || !stageReady) return;

      addMessage('user', escapeHtml(text));
      input.value = '';
      input.style.height = 'auto';
      $('sendBtn').disabled = true;

      const thinkingEl = addThinking();

      try {
        const res = await fetch('/api/edit-template', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ files: currentFiles, prompt: text, history: historyLog })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Edit failed');

        currentFiles = data.files;
        historyLog.push(text);
        renderPreview();
        switchTab('preview');

        thinkingEl.className = 'msg ai';
        thinkingEl.innerHTML = `✓ ${escapeHtml(data.summary || 'Applied your requested change.')}`;
      } catch (err) {
        thinkingEl.className = 'msg ai error';
        thinkingEl.innerHTML = `Couldn't apply that edit: ${escapeHtml(err.message || 'Unknown error')}. Try rephrasing.`;
      } finally {
        $('sendBtn').disabled = false;
      }
    }

    function escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    $('chatInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
    });
    $('chatInput').addEventListener('input', function () {
      this.style.height = 'auto';
      this.style.height = Math.min(120, this.scrollHeight) + 'px';
    });

    // ── Download ────────────────────────────────────────────────────────────
    function downloadZip() {
      if (!window.JSZip || !stageReady) return;
      const zip = new JSZip();
      zip.file('index.html', currentFiles.index_html || '');
      zip.file('styles.css', currentFiles.styles_css || '');
      zip.file('script.js', currentFiles.script_js || '');
      const slug = (planTitle || 'template').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') || 'template';
      zip.generateAsync({ type: 'blob' }).then(blob => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `${slug}.zip`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        URL.revokeObjectURL(url);
      });
    }

    // ── Init ────────────────────────────────────────────────────────────────
    async function init() {
      if (!templateId) { showFatal('No template selected — go back and pick one.'); return; }
      try {
        const res = await fetch(`/api/templates/${encodeURIComponent(templateId)}`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed to load template');

        planTitle = data.title || data.plan?.project_title || 'Untitled Template';
        $('templateTitle').textContent = planTitle;

        currentFiles = {
          index_html: getFile(data.files, 'index.html'),
          styles_css: getFile(data.files, 'styles.css'),
          script_js: getFile(data.files, 'script.js'),
        };

        buildStageShell();
        renderPreview();
        addMessage('ai', `Loaded <strong>${escapeHtml(planTitle)}</strong>. Ask me to change anything — colors, copy, layout, sections — and I'll update the live site on the right.`);
      } catch (err) {
        showFatal(err.message || 'Something went wrong loading this template.');
      }
    }

    init();
  </script>
</body>

</html>
